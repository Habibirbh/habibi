[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["/Users/rajatsingh/Desktop/HABIBI ESTATE/node_modules", "lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = true
verbosity = 2
fs_permissions = [
  { access = "read-write", path = "./deployments" },
  { access = "read", path = "./config" },
]

remappings = [
  "@openzeppelin/contracts/=../node_modules/@openzeppelin/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 512

[invariant]
runs = 64
depth = 64
fail_on_revert = false
